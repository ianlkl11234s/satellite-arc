<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0e1a"/>
  <!-- Earth circle -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Orbit 1 -->
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="#ffffff" stroke-width="1" transform="rotate(-30 16 16)" opacity="0.7"/>
  <!-- Orbit 2 -->
  <ellipse cx="16" cy="16" rx="13" ry="4" fill="none" stroke="#ffffff" stroke-width="0.8" transform="rotate(25 16 16)" opacity="0.5"/>
  <!-- Satellite dot -->
  <circle cx="25" cy="10" r="1.8" fill="#ffffff"/>
</svg>
